services:
  llm-gateway:
    image: intent-llm-gateway:latest
    build: .
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - GUARDRAIL_CONFIG_PATH=/etc/guardrail/guardrail.config.yaml
      - GUARDRAIL_POLICY_PATH=/etc/guardrail/main.yaml
      - GUARDRAIL_ENV_FILE=/etc/guardrail/.env.gateway
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./configs/local/guardrail.config.yaml:/etc/guardrail/guardrail.config.yaml:ro
      - ./configs/policies/main.yaml:/etc/guardrail/main.yaml:ro
      - ./configs/local/.env.gateway:/etc/guardrail/.env.gateway:ro
      - ./models:/models:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
