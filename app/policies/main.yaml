agent:
  name: coding-agent

allowed_intents:
  - coding.question
  - code.review
  - debugging.help


blocked_intents:
  - financial.advice
  - political.discussion
  - medical.advice

confidence:
  threshold: 0.6
  fallback: block

roles:
  admin:
    allow: ALL
  user:
    allow:
      - coding.question
      - code.review
      - debugging.help
    block:
      - financial.advice
      - political.discussion
      - medical.advice  
